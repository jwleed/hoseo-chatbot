<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Hoseo LENS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #fff; height: 100vh; display: flex; overflow: hidden; }

        /* ── 사이드바 ── */
        .sidebar { width: 260px; background: #171717; display: flex; flex-direction: column; flex-shrink: 0; }

        .sidebar-top { padding: 12px; }
        .logo { color: #fff; font-size: 1em; font-weight: 700; padding: 10px 8px 14px; }

        .new-chat-btn {
            width: 100%; display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px; color: #ececec;
            font-size: 0.88em; cursor: pointer; border: none; background: none; text-align: left;
        }
        .new-chat-btn:hover { background: #2a2a2a; }

        .sidebar-section { color: #555; font-size: 0.72em; padding: 14px 12px 6px; text-transform: uppercase; letter-spacing: 0.6px; }

        .history-list { flex: 1; overflow-y: auto; padding: 0 8px; }
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .history-item-wrap {
            display: flex; align-items: center; border-radius: 8px;
            transition: background 0.15s;
        }
        .history-item-wrap:hover { background: #2a2a2a; }
        .history-item-wrap:hover .history-del { opacity: 1; }
        .history-item-wrap.active { background: #2a2a2a; }
        .history-item {
            flex: 1; display: flex; align-items: center; gap: 8px;
            padding: 9px 10px; color: #ccc;
            font-size: 0.84em; cursor: pointer; border: none; background: none; text-align: left;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            min-width: 0;
        }
        .history-item:hover { color: #fff; }
        .history-item-wrap.active .history-item { color: #fff; }
        .history-item span { overflow: hidden; text-overflow: ellipsis; }
        .history-del {
            opacity: 0; flex-shrink: 0; padding: 6px 8px;
            background: none; border: none; color: #666; cursor: pointer;
            font-size: 0.9em; transition: color 0.15s, opacity 0.15s;
        }
        .history-del:hover { color: #ff6b6b; }

        .sidebar-bottom { padding: 12px; border-top: 1px solid #2a2a2a; }
        .admin-btn {
            width: 100%; display: flex; align-items: center; gap: 10px;
            padding: 9px 12px; border-radius: 8px; color: #666;
            font-size: 0.84em; cursor: pointer; border: none; background: none; text-align: left;
        }
        .admin-btn:hover { background: #2a2a2a; color: #999; }

        /* ── 메인 ── */
        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }

        /* 채팅 영역 */
        #chat-area { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
        #chat-area::-webkit-scrollbar { width: 6px; }
        #chat-area::-webkit-scrollbar-thumb { background: #e0e0e0; border-radius: 3px; }

        /* 환영 화면 */
        #welcome {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 40px 24px; min-height: 100%;
        }
        #welcome h2 { font-size: 1.8em; font-weight: 700; color: #0d0d0d; margin-bottom: 8px; }
        #welcome p { color: #888; font-size: 0.9em; margin-bottom: 32px; }

        .faq-categories { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-bottom: 16px; }
        .cat-btn {
            padding: 6px 14px; border-radius: 20px; border: 1px solid #e0e0e0;
            font-size: 0.84em; cursor: pointer; background: #fff; color: #444;
            transition: all 0.15s;
        }
        .cat-btn:hover, .cat-btn.active { background: #0d0d0d; color: #fff; border-color: #0d0d0d; }

        .faq-grid { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 600px; }
        .faq-btn {
            padding: 12px 16px; border-radius: 10px; border: 1px solid #e5e5e5;
            font-size: 0.88em; cursor: pointer; background: #fff; color: #333;
            text-align: left; transition: all 0.15s; line-height: 1.4;
        }
        .faq-btn:hover { border-color: #0d0d0d; background: #f9f9f9; }

        /* 메시지 */
        .msg-row { padding: 20px 0; display: flex; justify-content: center; }
        .msg-row.user { background: #fff; }
        .msg-row.ai { background: #f7f7f8; }

        .msg-inner { width: 100%; max-width: 720px; padding: 0 24px; display: flex; gap: 16px; align-items: flex-start; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75em; font-weight: 700; flex-shrink: 0; margin-top: 2px; }
        .avatar.user { background: #19c37d; color: #fff; }
        .avatar.ai { background: #ab68ff; color: #fff; }
        .msg-content { flex: 1; font-size: 0.95em; line-height: 1.7; color: #0d0d0d; white-space: pre-wrap; word-break: break-word; }

        .sources-box { margin-top: 12px; padding: 10px 14px; background: #f0f4ff; border-radius: 8px; border: 1px solid #d0deff; font-size: 0.82em; color: #333; }
        .sources-box a { color: #3b5bdb; text-decoration: none; }

        .typing-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: #999; animation: blink 1.2s infinite; margin-right: 3px; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0%,80%,100%{opacity:0.15} 40%{opacity:1} }

        /* 입력창 */
        .input-wrap { padding: 16px 24px 24px; display: flex; justify-content: center; background: #fff; }
        .input-box {
            width: 100%; max-width: 720px; background: #f4f4f4;
            border-radius: 16px; display: flex; align-items: flex-end;
            padding: 12px 16px; gap: 10px; border: 1px solid #e5e5e5;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .input-box:focus-within { border-color: #aaa; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        #question { flex: 1; border: none; background: none; font-size: 0.95em; line-height: 1.5; outline: none; resize: none; max-height: 180px; overflow-y: auto; color: #0d0d0d; }
        #question::placeholder { color: #aaa; }
        #send-btn { width: 34px; height: 34px; border-radius: 8px; border: none; background: #0d0d0d; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s; }
        #send-btn:disabled { background: #d0d0d0; cursor: not-allowed; }

        /* ── 어드민 모달 ── */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.open { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-height: 80vh; overflow-y: auto; }
        .modal h3 { font-size: 1em; margin-bottom: 16px; }
        .modal-close { float: right; background: none; border: none; font-size: 1.2em; cursor: pointer; color: #888; }

        label { font-size: 0.82em; color: #444; display: block; margin: 8px 0 3px; }
        input[type=text], textarea {
            width: 100%; padding: 7px 10px; border: 1px solid #ddd;
            border-radius: 7px; font-size: 0.88em; outline: none; background: #fafafa;
        }
        input:focus, textarea:focus { border-color: #aaa; background: #fff; }
        textarea { resize: vertical; min-height: 56px; }
        .btn { padding: 8px 16px; border: none; border-radius: 7px; cursor: pointer; font-size: 0.88em; font-weight: 600; }
        .btn-primary { background: #0d0d0d; color: #fff; width: 100%; margin-top: 12px; padding: 10px; }
        .modal-result { margin-top: 12px; background: #111; border-radius: 8px; padding: 12px; font-size: 0.78em; color: #d4d4d4; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<!-- 사이드바 -->
<aside class="sidebar">
    <div class="sidebar-top">
        <div class="logo">🔵 Hoseo LENS</div>
        <button class="new-chat-btn" onclick="newChat()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
            새 대화
        </button>
    </div>

    <div class="sidebar-section">이전 대화</div>
    <div class="history-list" id="history-list">
        <div style="color:#444; font-size:0.8em; padding:8px 10px;">불러오는 중...</div>
    </div>

    <div class="sidebar-bottom">
        <button class="admin-btn" onclick="openAdmin()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 1 0 4.93 19.07M12 2v2M12 20v2M2 12h2M20 12h2"/></svg>
            공지 이벤트 테스트
        </button>
    </div>
</aside>

<!-- 메인 -->
<main class="main">
    <div id="chat-area">
        <div id="welcome">
            <h2>Hoseo LENS</h2>
            <p>호서대학교 챗봇에게 무엇이든 물어보세요.</p>
            <div class="faq-categories" id="faq-categories"></div>
            <div class="faq-grid" id="faq-grid"></div>
        </div>
    </div>
    <div class="input-wrap">
        <div class="input-box">
            <textarea id="question" rows="1" placeholder="메시지를 입력하세요..."></textarea>
            <button id="send-btn" onclick="sendQuestion()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
            </button>
        </div>
    </div>
</main>

<!-- 어드민 모달 -->
<div class="modal-overlay" id="admin-modal">
    <div class="modal">
        <button class="modal-close" onclick="closeAdmin()">✕</button>
        <h3>공지 이벤트 전송 (AI 서버 시뮬레이션)</h3>
        <label>API Key</label>
        <input type="text" id="notice-api-key" value="hoseo-lens-secret-key" />
        <label>notice_id</label>
        <input type="text" id="notice-id" placeholder="96860" />
        <label>title</label>
        <input type="text" id="notice-title" placeholder="공지 제목" />
        <label>date (YYYY-MM-DD)</label>
        <input type="text" id="notice-date" placeholder="2026-05-09" />
        <label>url</label>
        <input type="text" id="notice-url" placeholder="https://www.hoseo.ac.kr/..." />
        <label>category</label>
        <input type="text" id="notice-category" placeholder="AI 글쓰기 클리닉" />
        <label>major_category</label>
        <input type="text" id="notice-major" placeholder="비교과/특강/행사" />
        <label>target</label>
        <input type="text" id="notice-target" placeholder="재학생" />
        <label>entity</label>
        <input type="text" id="notice-entity" placeholder="에듀테크교수학습역량지원센터" />
        <button class="btn btn-primary" onclick="sendNotice()">전송</button>
        <div class="modal-result" id="notice-result" style="display:none"></div>
    </div>
</div>

<script>
    const BASE      = window.location.origin;
    const DEVICE_ID = 'test-user-001';
    let   sessionId = 'session-' + Date.now();
    let   currentRoomId = null;

    // ── 초기화 ──
    window.onload = () => {
        loadFaqs();
        loadHistory();
    };

    // ── FAQ ──
    let allFaqs = [];
    let currentCat = null;

    async function loadFaqs() {
        try {
            const res  = await fetch(`${BASE}/api/faq`);
            allFaqs = await res.json();
            renderCategories();
            renderFaqs(null);
        } catch { }
    }

    function renderCategories() {
        const cats = [...new Set(allFaqs.map(f => f.category).filter(Boolean))];
        const el = document.getElementById('faq-categories');
        el.innerHTML = `<button class="cat-btn active" onclick="filterCat(null, this)">전체</button>` +
            cats.map(c => `<button class="cat-btn" onclick="filterCat('${c}', this)">${c}</button>`).join('');
    }

    function filterCat(cat, btn) {
        currentCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderFaqs(cat);
    }

    function renderFaqs(cat) {
        const list = cat ? allFaqs.filter(f => f.category === cat) : allFaqs;
        document.getElementById('faq-grid').innerHTML = list
            .filter(f => f.is_active !== false)
            .map(f => `<button class="faq-btn" onclick="askFaq('${escHtml(f.question)}')">${escHtml(f.question)}</button>`)
            .join('');
    }

    function askFaq(question) {
        document.getElementById('question').value = question;
        sendQuestion();
    }

    // ── 히스토리 ──
    async function loadHistory() {
        try {
            const res  = await fetch(`${BASE}/api/history/${DEVICE_ID}`);
            const data = await res.json();
            const list = data.history || [];
            const el   = document.getElementById('history-list');

            if (!list.length) {
                el.innerHTML = '<div style="color:#444; font-size:0.8em; padding:8px 10px;">대화 없음</div>';
                return;
            }
            el.innerHTML = list.map(r => `
                <div class="history-item-wrap" id="wrap-${r.chat_room_id}">
                    <button class="history-item" onclick="loadRoom(${r.chat_room_id}, '${r.session_id}', this)">
                        <span>${escHtml(r.first_question || '대화')}</span>
                    </button>
                    <button class="history-del" onclick="deleteRoom(${r.chat_room_id})" title="삭제">✕</button>
                </div>`).join('');
        } catch {
            document.getElementById('history-list').innerHTML =
                '<div style="color:#444; font-size:0.8em; padding:8px 10px;">불러오기 실패</div>';
        }
    }

    async function deleteRoom(chatRoomId) {
        await fetch(`${BASE}/api/history/${DEVICE_ID}/${chatRoomId}`, { method: 'DELETE' });
        if (currentRoomId === chatRoomId) {
            newChat();
        }
        loadHistory();
    }

    async function loadRoom(chatRoomId, roomSessionId, btn) {
        document.querySelectorAll('.history-item-wrap').forEach(b => b.classList.remove('active'));
        btn.closest('.history-item-wrap').classList.add('active');
        currentRoomId = chatRoomId;
        sessionId = roomSessionId;

        try {
            const res  = await fetch(`${BASE}/api/history/${DEVICE_ID}/${chatRoomId}`);
            const data = await res.json();
            clearChat();
            (data.messages || []).forEach(msg => {
                const role = msg.role === 'user' ? 'user' : 'ai';
                appendMessage(role, msg.content);
            });
        } catch { }
    }

    // ── 새 대화 ──
    function newChat() {
        document.querySelectorAll('.history-item').forEach(b => b.classList.remove('active'));
        sessionId = 'session-' + Date.now();
        currentRoomId = null;
        const area = document.getElementById('chat-area');
        area.innerHTML = `<div id="welcome">
            <h2>Hoseo LENS</h2>
            <p>호서대학교 챗봇에게 무엇이든 물어보세요.</p>
            <div class="faq-categories" id="faq-categories"></div>
            <div class="faq-grid" id="faq-grid"></div>
        </div>`;
        renderCategories();
        renderFaqs(null);
    }

    function clearChat() {
        document.getElementById('chat-area').innerHTML = '';
    }

    // ── 채팅 ──
    const ta = document.getElementById('question');
    ta.addEventListener('input', () => { ta.style.height = 'auto'; ta.style.height = Math.min(ta.scrollHeight, 180) + 'px'; });
    ta.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } });

    function ensureChat() {
        const welcome = document.getElementById('welcome');
        if (welcome) welcome.remove();
    }

    function appendMessage(role, text) {
        ensureChat();
        const area = document.getElementById('chat-area');
        const row  = document.createElement('div');
        row.className = 'msg-row ' + role;
        row.innerHTML = `<div class="msg-inner">
            <div class="avatar ${role}">${role === 'user' ? 'U' : 'AI'}</div>
            <div class="msg-content">${escHtml(text)}</div>
        </div>`;
        area.appendChild(row);
        area.scrollTop = area.scrollHeight;
        return row.querySelector('.msg-content');
    }

    function appendTyping() {
        ensureChat();
        const area = document.getElementById('chat-area');
        const row  = document.createElement('div');
        row.id = 'typing-row';
        row.className = 'msg-row ai';
        row.innerHTML = `<div class="msg-inner"><div class="avatar ai">AI</div>
            <div class="msg-content"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div></div>`;
        area.appendChild(row);
        area.scrollTop = area.scrollHeight;
    }

    function removeTyping() { const el = document.getElementById('typing-row'); if (el) el.remove(); }

    function appendSources(el, sources) {
        const div = document.createElement('div');
        div.className = 'sources-box';
        div.innerHTML = '<strong>출처</strong><br>' + sources.map(s => {
            const title = s.title || s;
            return s.file_url ? `• <a href="${s.file_url}" target="_blank">${title}</a>` : `• ${title}`;
        }).join('<br>');
        el.appendChild(div);
    }

    async function sendQuestion() {
        const input    = document.getElementById('question');
        const sendBtn  = document.getElementById('send-btn');
        const question = input.value.trim();
        if (!question) return;

        appendMessage('user', question);
        input.value = '';
        input.style.height = 'auto';
        sendBtn.disabled = true;
        appendTyping();

        let aiContent = null;

        try {
            const res = await fetch(`${BASE}/api/chat/ask`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
                body: JSON.stringify({ user_id: DEVICE_ID, session_id: sessionId, question })
            });

            const reader  = res.body.getReader();
            const decoder = new TextDecoder('utf-8');
            let buffer = '';

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split('\n');
                buffer = lines.pop();

                for (const line of lines) {
                    if (!line.startsWith('data:')) continue;
                    const data = line.slice(5).trim();
                    if (data === '[DONE]') {
                        sendBtn.disabled = false;
                        loadHistory();
                        return;
                    }
                    try {
                        const parsed = JSON.parse(data);
                        if (parsed.error) {
                            removeTyping();
                            appendMessage('ai', `오류: [${parsed.error.code}] ${parsed.error.message}`);
                            sendBtn.disabled = false;
                            return;
                        }
                        if (parsed.chunk) {
                            if (!aiContent) { removeTyping(); aiContent = appendMessage('ai', ''); }
                            aiContent.textContent += parsed.chunk;
                            document.getElementById('chat-area').scrollTop = 99999;
                        }
                        if (parsed.sources?.length > 0 && aiContent) appendSources(aiContent, parsed.sources);
                    } catch (_) {}
                }
            }
        } catch (err) {
            removeTyping();
            appendMessage('ai', '서버 연결 오류: ' + err.message);
        } finally {
            sendBtn.disabled = false;
        }
    }

    // ── 어드민 ──
    function openAdmin()  { document.getElementById('admin-modal').classList.add('open'); }
    function closeAdmin() { document.getElementById('admin-modal').classList.remove('open'); }
    document.getElementById('admin-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAdmin(); });

    async function sendNotice() {
        const key = document.getElementById('notice-api-key').value;
        const payload = {
            source: 'ai_incremental_updater',
            generated_at: new Date().toISOString(),
            count: 1,
            items: [{
                notice_id:      document.getElementById('notice-id').value,
                title:          document.getElementById('notice-title').value,
                date:           document.getElementById('notice-date').value,
                url:            document.getElementById('notice-url').value,
                category:       document.getElementById('notice-category').value,
                major_category: document.getElementById('notice-major').value,
                target:         document.getElementById('notice-target').value,
                entity:         document.getElementById('notice-entity').value,
            }]
        };
        const res  = await fetch(`${BASE}/api/notices/new`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': key },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        const el   = document.getElementById('notice-result');
        el.style.display = 'block';
        el.textContent = JSON.stringify(data, null, 2);
    }

    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
</script>
</body>
</html>
